<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Topologia do laboratorio remoto com OPNsense">
  <defs>
    <style>
      .bg { fill: #f7faff; }
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 52px; font-weight: 700; fill: #07194d; }
      .label { font-size: 28px; font-weight: 700; fill: #07194d; }
      .small { font-size: 20px; font-weight: 600; fill: #1b2a42; }
      .tiny { font-size: 17px; font-weight: 600; fill: #1b2a42; }
      .muted { font-size: 18px; font-weight: 600; fill: #526070; }
      .card { fill: #ffffff; stroke: #c9d7ea; stroke-width: 2; }
      .shadow { filter: drop-shadow(0 12px 18px rgba(18, 42, 84, .14)); }
      .blue { fill: #174f86; }
      .blue-stroke { stroke: #174f86; }
      .wan { fill: #c8231d; }
      .wan-stroke { stroke: #c8231d; }
      .lan { fill: #1359b8; }
      .lan-stroke { stroke: #1359b8; }
      .wg { fill: #7a2fc7; }
      .wg-stroke { stroke: #7a2fc7; }
      .green { fill: #14723d; }
      .green-stroke { stroke: #14723d; }
      .arrow { stroke: #174f86; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }
      .arrow-red { stroke: #c8231d; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowRed); }
      .arrow-blue { stroke: #1359b8; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowLan); }
      .arrow-purple { stroke: #7a2fc7; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowWg); }
      .dash-purple { stroke: #7a2fc7; stroke-width: 7; fill: none; stroke-linecap: round; stroke-dasharray: 12 14; marker-end: url(#arrowWg); }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#174f86"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c8231d"/>
    </marker>
    <marker id="arrowLan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#1359b8"/>
    </marker>
    <marker id="arrowWg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7a2fc7"/>
    </marker>
    <linearGradient id="serverGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#0f315c"/>
      <stop offset="1" stop-color="#061a38"/>
    </linearGradient>
    <linearGradient id="fwGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20314b"/>
      <stop offset="1" stop-color="#0b1322"/>
    </linearGradient>
